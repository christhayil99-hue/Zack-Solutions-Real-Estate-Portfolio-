<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Detail — Zack Real Estate</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Zack Real Estate</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="listings.html">Listings</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <div class="section">
      <a href="listings.html" style="font-size:13px;color:#888;display:block;margin-bottom:20px">
        ← Back to listings
      </a>

      <!-- Two-column layout: property info left, inquiry form right -->
      <div class="detail-layout">

        <!-- Left column: property details (filled by app.js) -->
        <div id="property-detail">
          <p class="loading">Loading property...</p>
        </div>

        <!-- Right column: inquiry form (sidebar) -->
        <aside class="inquiry-card">
          <h3>Interested? Send an inquiry</h3>
          <form id="inquiry-form">
            <!-- Hidden fields pass property info to the server -->
            <input type="hidden" id="inquiry-property-id"/>
            <input type="hidden" id="inquiry-property-title"/>

            <div class="form-group">
              <label for="inq-name">Full name *</label>
              <input type="text" id="inq-name" name="name" required placeholder="John Smith"/>
            </div>

            <div class="form-group">
              <label for="inq-email">Email address *</label>
              <input type="email" id="inq-email" name="email" required placeholder="john@email.com"/>
            </div>

            <div class="form-group">
              <label for="inq-phone">Phone number</label>
              <input type="tel" id="inq-phone" name="phone" placeholder="555-123-4567"/>
            </div>

            <div class="form-group">
              <label for="inq-message">Message *</label>
              <textarea id="inq-message" name="message" required
                placeholder="I'd like to schedule a viewing..."></textarea>
            </div>

            <button type="submit" class="btn btn-dark" style="width:100%">
              Send Inquiry
            </button>
          </form>
        </aside>
      </div>
    </div>
  </main>

  <footer style="text-align:center;padding:32px;color:#888;font-size:13px;border-top:1px solid #e5e5e3">
    © 2025 Zack Real Estate · Built for Zack Solutions Group
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
