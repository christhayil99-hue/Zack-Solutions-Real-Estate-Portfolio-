<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZSG Realty — Find Your Next Property</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

  <!-- Navigation bar (same on every page) -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">ZSG Realty</a>
      <ul class="nav-links">
        <li><a href="index.html"    class="active">Home</a></li>
        <li><a href="listings.html">Listings</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Find your next property</h1>
    <p>Browse curated real estate listings across New York and beyond</p>
    <!-- Quick search — takes user to listings page with their query -->
    <form class="search-bar" onsubmit="goToListings(event)">
      <input type="text" id="hero-search" placeholder="Search by city, zip, or type..."/>
      <button type="submit" class="btn btn-dark">Search</button>
    </form>
  </section>

  <!-- Featured Listings Section -->
  <main class="container">
    <div class="section">
      <h2 class="section-title">Featured listings</h2>
      <!-- app.js fills this div with property cards -->
      <div id="featured-listings" class="cards-grid">
        <p class="loading">Loading...</p>
      </div>
      <div style="text-align:center; margin-top:32px">
        <a href="listings.html" class="btn btn-outline">View all listings →</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="text-align:center; padding:32px; color:#444; font-size:14px; border-top:2px solid #1a3a5c; background:#f0f4f8;">
    © 2025 ZSG Realty · Built for Zack Solutions Group
  </footer>

  <script src="js/app.js"></script>
  <script>
    // Takes user to listings page with their search term
    function goToListings(e) {
      e.preventDefault();
      const q = document.getElementById('hero-search').value;
      window.location.href = 'listings.html';
    }
  </script>
</body>
</html>
